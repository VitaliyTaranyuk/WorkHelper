spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true
  app:
    jwtSecret: mySecretKey123912738aopsgjnspkmndfsopkvajoirjg94gf2opfng2moknm
    jwtExpirationMs: ${EXPIRATIONS_MS:1800000}
    refreshExpiration: ${REFRESH_EXPIRATIONS:86400000}
  datasource:
    url: ${DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    show-sql: ${SHOW_SQL:false}
    hibernate:
      ddl-auto: none
  cors:
    allowed:
      origins: ${ORIGIN_CORS:"http://91.211.249.37:30080"}
      local: ${LOCAL_CORS:"http://localhost:3000"}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

app:
  attachments:
    storage-dir: ${ATTACHMENTS_DIR:/var/lib/workhelper/attachments}
  dev-panel:
    # Панель «Разработка» в карточке задачи (ТП-21): репозиторий owner/repo,
    # чьи ветки и PR связываются с задачами по коду (например tp21 / ТП-21).
    # Репозиторий публичный — GitHub REST API используется без токена
    # (лимит 60 запросов/час на IP покрывается кэшем в 5 минут).
    github-repo: ${DEV_PANEL_GITHUB_REPO:VitaliyTaranyuk/WorkHelper}
  meet:
    # WorkTask Meet (.ai/MEET_ARCHITECTURE.md): mesh-топология, жёсткий предел
    # комнаты. TURN подключается env-переменными без изменения кода; креденшелы
    # только через окружение (секреты в репозитории запрещены).
    max-participants: ${MEET_MAX_PARTICIPANTS:8}
    stun-urls: ${MEET_STUN_URLS:stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302}
    turn-urls: ${MEET_TURN_URLS:}
    turn-username: ${MEET_TURN_USERNAME:}
    turn-credential: ${MEET_TURN_CREDENTIAL:}
  mail:
    enable: ${ENABLE_EMAIL_SENDING:false}
    login: ${EMAIL_LOGIN:email@mail.ru}
    password: ${EMAIL_PASSWORD:mypassword}
    host: ${EMAIL_HOST:smtp.mail.ru}
    port: ${EMAIL_PORT:465}
    has-proxy: ${HAS_PROXY:false}
    proxy-host: ${PROXY_HOST:mailtest@mail.ru}
    proxy-port: ${PROXY_PORT:23}
    connect-timeout: ${EMAIL_CONNECT_TIMEOUT:100000}
    read-timeout: ${EMAIL_READ_TIMEOUT:100000}
    sending-url: ${SERVER_URL:http://localhost:8090}
    protocol: ${EMAIL_PROTOCOL:STARTTLS}
    from-email: ${EMAIL_SUBJECT:worktechtest@mail.ru}
    prefix: ${TEMPLATE_PATH:"mail/"}

server:
  port: ${PORT:8080}

logging:
  levelly: TRACE