server {
    listen 80;
    server_name wowoffcata.hlab.kz;

    # Лимит размера запроса (multipart upload вложений): backend разрешает до 25MB,
    # nginx должен пропускать запрос целиком с небольшим запасом.
    client_max_body_size 30M;

    root /var/www/workhelper;
    index index.html;

    # SPA routing — все неизвестные пути отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket (сигналинг WorkTask Meet): upgrade-заголовки + длинный read
    # timeout (соединение живёт всю встречу, ping каждые 25с).
    location /work-task/ws/ {
        proxy_pass         http://127.0.0.1:8080/work-task/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Proxy к backend Spring Boot
    location /work-task/ {
        proxy_pass         http://127.0.0.1:8080/work-task/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
