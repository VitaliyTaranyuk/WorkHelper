services:
  backend:
    build:
      context: ./backend
    image: work-task-backend
    env_file: .env.vds
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/lib/workhelper/attachments:/var/lib/workhelper/attachments
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8080/work-task/api/v1/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ТП-175: self-hosted мониторинг клиентских ошибок (GlitchTip, Sentry-протокол).
  # Данные ошибок не покидают VDS; фронтенд шлёт события через nginx-локацию
  # /api/N/envelope/ (см. infra/apply-nginx-glitchtip.sh), UI — на :8443.
  # Секреты в .env.glitchtip генерирует infra/glitchtip/ensure-env.sh при деплое.
  glitchtip-postgres:
    image: postgres:17-alpine
    container_name: glitchtip-postgres
    env_file: .env.glitchtip
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip-pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip"]
      interval: 30s
      timeout: 5s
      retries: 5

  glitchtip-redis:
    image: valkey/valkey:8-alpine
    container_name: glitchtip-redis
    restart: unless-stopped
    mem_limit: 64m

  glitchtip-web:
    image: glitchtip/glitchtip:v6.2
    container_name: glitchtip-web
    env_file: .env.glitchtip
    ports:
      - "127.0.0.1:8090:8080"
    depends_on:
      - glitchtip-postgres
      - glitchtip-redis
    restart: unless-stopped
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/_health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  glitchtip-worker:
    image: glitchtip/glitchtip:v6.2
    container_name: glitchtip-worker
    command: ./bin/run-celery-with-beat.sh
    env_file: .env.glitchtip
    depends_on:
      - glitchtip-postgres
      - glitchtip-redis
    restart: unless-stopped
    mem_limit: 512m

  glitchtip-migrate:
    image: glitchtip/glitchtip:v6.2
    container_name: glitchtip-migrate
    command: ./bin/run-migrate.sh
    env_file: .env.glitchtip
    depends_on:
      - glitchtip-postgres
      - glitchtip-redis
    restart: "no"

volumes:
  glitchtip-pg-data:
